<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mecânico</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='mecanicos'"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/layout :: topbar(${mecanico.id == null ? 'Novo Mecânico' : 'Editar Mecânico'})}"></div>
    <main class="page-content">

        <div class="card" style="max-width: 600px;">
            <div class="card-header">
                <h2 th:text="${mecanico.id == null ? 'Novo Mecânico' : 'Editar Mecânico'}"></h2>
            </div>
            <div style="padding: 20px;">
                <form th:action="${mecanico.id == null ? '/mecanicos/novo' : '/mecanicos/editar/' + mecanico.id}"
                      th:object="${mecanico}"
                      method="post"
                      class="form-grid">

                    <div class="form-group">
                        <label for="nif">NIF</label>
                        <input type="text" id="nif" th:field="*{nif}"
                               class="filter-input" placeholder="NIF do mecânico"/>
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nome}"
                               class="filter-input" placeholder="Nome completo"/>
                    </div>

                    <div class="form-group">
                        <label for="especialidade">Especialidade</label>
                        <input type="text" id="especialidade" th:field="*{especialidade}"
                               class="filter-input" placeholder="Especialidade"/>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <a th:href="@{/mecanicos}" class="btn btn-outline">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>

</body>
</html>
