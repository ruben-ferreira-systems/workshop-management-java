<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cliente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='clientes'"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/layout :: topbar(${cliente.id == null ? 'Novo Cliente' : 'Editar Cliente'})}"></div>
    <main class="page-content">

        <div class="card" style="max-width: 600px;">
            <div class="card-header">
                <h2 th:text="${cliente.id == null ? 'Novo Cliente' : 'Editar Cliente'}"></h2>
            </div>
            <div style="padding: 20px;">
                <form th:action="${cliente.id == null ? '/clientes/novo' : '/clientes/editar/' + cliente.id}"
                      th:object="${cliente}"
                      method="post"
                      class="form-grid">

                    <div class="form-group">
                        <label for="nif">NIF</label>
                        <input type="text" id="nif" th:field="*{nif}"
                               class="filter-input" placeholder="NIF do cliente"/>
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nome}"
                               class="filter-input" placeholder="Nome completo"/>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" th:field="*{telefone}"
                               class="filter-input" placeholder="Nº de telefone"/>
                    </div>

                    <div class="form-group">
                        <label for="morada">Morada</label>
                        <input type="text" id="morada" th:field="*{morada}"
                               class="filter-input" placeholder="Morada"/>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <a th:href="@{/clientes}" class="btn btn-outline">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>

</body>
</html>
