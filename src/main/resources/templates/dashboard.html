<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='dashboard'"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/layout :: topbar('Dashboard')}"></div>
    <main class="page-content">

        <!-- KPIs -->
        <div class="kpi-grid">

            <div class="kpi-card">
                <div class="kpi-icon kpi-blue">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="kpi-info">
                    <span class="kpi-label">Clientes</span>
                    <span class="kpi-value" th:text="${totalClientes}">0</span>
                </div>
            </div>

            <div class="kpi-card">
                <div class="kpi-icon kpi-green">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16L3.95 6.06M14.31 16H2.83M16.62 12l-5.74 9.94"/>
                    </svg>
                </div>
                <div class="kpi-info">
                    <span class="kpi-label">Mecânicos</span>
                    <span class="kpi-value" th:text="${totalMecanicos}">0</span>
                </div>
            </div>

            <div class="kpi-card">
                <div class="kpi-icon kpi-purple">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/>
                        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
                    </svg>
                </div>
                <div class="kpi-info">
                    <span class="kpi-label">Veículos</span>
                    <span class="kpi-value" th:text="${totalVeiculos}">0</span>
                </div>
            </div>

            <div class="kpi-card">
                <div class="kpi-icon kpi-orange">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
                    </svg>
                </div>
                <div class="kpi-info">
                    <span class="kpi-label">Folhas de Obra</span>
                    <span class="kpi-value" th:text="${totalFolhas}">0</span>
                </div>
            </div>

        </div>

        <!-- Linha inferior: Folhas recentes + Peças sem stock -->
        <div class="dashboard-grid">

            <!-- Folhas recentes -->
            <div class="card">
                <div class="card-header">
                    <h2>Folhas Recentes</h2>
                    <a th:href="@{/folhas}" class="btn btn-outline">Ver todas</a>
                </div>
                <table>
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Data</th>
                        <th>Veículo</th>
                        <th>Mecânico</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(folhasRecentes)}">
                        <td colspan="5" class="empty-row">Nenhuma folha registada.</td>
                    </tr>
                    <tr th:each="f : ${folhasRecentes}">
                        <td th:text="${f.id}"></td>
                        <td th:text="${#temporals.format(f.dataEntrada, 'dd/MM/yyyy')}"></td>
                        <td th:text="${f.veiculo.matricula + ' — ' + f.veiculo.marca}"></td>
                        <td th:text="${f.mecanico.nome}"></td>
                        <td>
                            <a th:href="@{/folhas/{id}(id=${f.id})}" class="btn btn-outline">Ver</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Peças sem stock -->
            <div class="card">
                <div class="card-header">
                    <h2>Peças Sem Stock</h2>
                    <a th:href="@{/pecas}" class="btn btn-outline">Ver todas</a>
                </div>
                <table>
                    <thead>
                    <tr>
                        <th>Referência</th>
                        <th>Nome</th>
                        <th>Stock</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(pecasSemStock)}">
                        <td colspan="3" class="empty-row">✓ Todas as peças têm stock.</td>
                    </tr>
                    <tr th:each="p : ${pecasSemStock}">
                        <td th:text="${p.referencia}"></td>
                        <td th:text="${p.nome}"></td>
                        <td><span class="badge badge-gray">0</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>
</div>
</body>
</html>
