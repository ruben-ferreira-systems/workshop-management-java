<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Veículo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='veiculos'"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/layout :: topbar(${veiculo.id == null ? 'Novo Veículo' : 'Editar Veículo'})}"></div>
    <main class="page-content">

        <div class="card" style="max-width: 600px;">
            <div class="card-header">
                <h2 th:text="${veiculo.id == null ? 'Novo Veículo' : 'Editar Veículo'}"></h2>
            </div>
            <div style="padding: 20px;">
                <form th:action="${veiculo.id == null ? '/veiculos/novo' : '/veiculos/editar/' + veiculo.id}"
                      th:object="${veiculo}"
                      method="post"
                      class="form-grid">

                    <div class="form-group">
                        <label for="matricula">Matrícula</label>
                        <input type="text" id="matricula" th:field="*{matricula}"
                               class="filter-input" placeholder="Ex: AA-00-AA"/>
                    </div>

                    <div class="form-group">
                        <label for="marca">Marca</label>
                        <input type="text" id="marca" th:field="*{marca}"
                               class="filter-input" placeholder="Ex: Volkswagen"/>
                    </div>

                    <div class="form-group">
                        <label for="modelo">Modelo</label>
                        <input type="text" id="modelo" th:field="*{modelo}"
                               class="filter-input" placeholder="Ex: Golf"/>
                    </div>

                    <div class="form-group">
                        <label for="ano">Ano</label>
                        <input type="number" id="ano" th:field="*{ano}"
                               class="filter-input" placeholder="Ex: 2020"/>
                    </div>

                    <div class="form-group">
                        <label for="cliente">Cliente</label>
                        <select id="cliente" th:field="*{cliente.id}" class="filter-input">
                            <option value="">-- Selecionar cliente --</option>
                            <option th:each="c : ${clientes}"
                                    th:value="${c.id}"
                                    th:text="${c.nome}">
                            </option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <a th:href="@{/veiculos}" class="btn btn-outline">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>

</body>
</html>
